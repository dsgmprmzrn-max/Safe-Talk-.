<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAFE TALK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
    .header { background: #534AB7; color: white; padding: 16px; text-align: center; }
    .header h1 { font-size: 20px; letter-spacing: 2px; }
    .header p { font-size: 12px; opacity: .8; margin-top: 2px; }
    .nav { display: flex; background: white; border-bottom: 1px solid #eee; }
    .nav button { flex: 1; padding: 12px 4px; border: none; background: none; font-size: 12px; color: #888; cursor: pointer; }
    .nav button.active { color: #534AB7; border-bottom: 2px solid #534AB7; font-weight: 600; }
    .screen { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
    .screen.active { display: block; }
    .card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid #eee; }
    .label { font-size: 11px; color: #aaa; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
    .risk-bar { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; border-radius: 8px; background: white; border: 1px solid #eee; margin-bottom: 12px; }
    .risk-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .risk-info { flex: 1; }
    .risk-label { font-weight: 600; font-size: 13px; }
    .risk-factor { font-size: 11px; color: #888; margin-top: 2px; }
    .bubble { background: #f0f0f0; border-radius: 4px 12px 12px 12px; padding: 10px 12px; margin-bottom: 14px; font-size: 14px; line-height: 1.5; }
    .bubble-label { font-size: 11px; color: #aaa; font-weight: 600; margin-bottom: 2px; }
    .choice { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 13px; text-align: left; cursor: pointer; line-height: 1.5; transition: background .15s; }
    .choice:hover { background: #f8f8f8; }
    .choice.correct { background: #E1F5EE; border-color: #1D9E75; }
    .choice.wrong { background: #FAECE7; border-color: #D85A30; }
    .choice.neutral { background: #FAEEDA; border-color: #BA7517; }
    .feedback { padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.6; margin-bottom: 8px; }
    .feedback.good { background: #E1F5EE; border-left: 3px solid #1D9E75; }
    .feedback.bad { background: #FAECE7; border-left: 3px solid #D85A30; }
    .feedback.neutral { background: #FAEEDA; border-left: 3px solid #BA7517; }
    .feedback-title { font-weight: 600; margin-bottom: 4px; }
    .progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .progress-bar { flex: 1; height: 4px; background: #eee; border-radius: 2px; }
    .progress-fill { height: 100%; background: #534AB7; border-radius: 2px; transition: width .3s; }
    .next-btn { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; background: white; font-size: 14px; cursor: pointer; font-weight: 500; margin-top: 4px; }
    .next-btn:hover { background: #f5f5f5; }
 
    /* 사례 탭 */
    .case-card { background: white; border-radius: 12px; margin-bottom: 14px; border: 1px solid #eee; overflow: hidden; }
    .case-body { padding: 14px; }
    .case-tag { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
    .tag-alcohol  { background: #FAEEDA; color: #412402; }
    .tag-roommate { background: #E6F1FB; color: #0C447C; }
    .tag-delirium { background: #FAECE7; color: #4A1B0C; }
    .tag-guardian { background: #EAF3DE; color: #27500A; }
    .tag-mental   { background: #EEEDFE; color: #26215C; }
    .tag-noise    { background: #F1EFE8; color: #2C2C2A; }
    .tag-dementia { background: #FBEAF0; color: #4B1528; }
    .tag-smoking  { background: #E1F5EE; color: #04342C; }
    .case-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .case-summary { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 6px; }
    .case-cause { font-size: 12px; color: #D85A30; margin-bottom: 6px; font-weight: 500; }
    .expand-btn { font-size: 12px; color: #534AB7; background: none; border: none; cursor: pointer; padding: 0; font-weight: 500; }
    .case-detail { display: none; margin-top: 12px; }
 
    .detail-section { margin-bottom: 12px; }
    .detail-label { font-size: 11px; font-weight: 700; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .step-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
    .step-icon { width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .step-bad  { background: #FAECE7; color: #993C1D; }
    .step-good { background: #E1F5EE; color: #0F6E56; }
 
    /* 해결방안 — KOPS+MAPS 섞은 형식 */
    .solution-wrap { border-radius: 8px; overflow: hidden; border: 1px solid #e0e0f5; }
    .solution-header { background: #534AB7; color: white; padding: 8px 12px; font-size: 12px; font-weight: 600; }
    .solution-block { border-bottom: 1px solid #eee; }
    .solution-block:last-child { border-bottom: none; }
    .solution-block-title { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: #f0f0fa; font-size: 12px; font-weight: 600; color: #3C3489; }
    .solution-block-num { width: 20px; height: 20px; border-radius: 50%; background: #534AB7; color: white; font-size: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .solution-items { padding: 8px 12px 10px 40px; }
    .solution-item { font-size: 12px; color: #444; line-height: 1.7; display: flex; gap: 6px; }
    .solution-item::before { content: '•'; color: #534AB7; flex-shrink: 0; }
 
    .maps-block { background: #faf0ff; border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
    .maps-title { font-size: 12px; font-weight: 700; color: #534AB7; margin-bottom: 6px; }
    .maps-stage { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .maps-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .maps-stage-text { font-size: 12px; color: #444; line-height: 1.5; }
 
    .ref-box { font-size: 11px; color: #bbb; margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee; line-height: 1.5; }
 
    /* 통계 */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .stat-card { background: #f8f8f8; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 600; color: #534AB7; }
    .stat-label { font-size: 11px; color: #aaa; margin-top: 2px; }
    .risk-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; color: #555; }
    .risk-dot-sm { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
 
<div class="header">
  <h1>SAFE TALK</h1>
  <p>AI 기반 병동 폭력 예방 교육 시스템</p>
</div>
 
<div class="nav">
  <button class="active" onclick="showTab('sim',this)">▶ 시뮬</button>
  <button onclick="showTab('cases',this)">📚 사례</button>
  <button onclick="showTab('stats',this)">📊 통계</button>
</div>
 
<div id="tab-sim" class="screen active">
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:16%"></div></div>
    <span id="prog-text" style="font-size:12px;color:#aaa">1 / 6</span>
  </div>
  <div class="risk-bar">
    <div class="risk-dot" id="risk-dot"></div>
    <div class="risk-info">
      <div class="risk-label" id="risk-label"></div>
      <div class="risk-factor" id="risk-factor"></div>
    </div>
  </div>
  <div id="sim-body"></div>
</div>
 
<div id="tab-cases" class="screen">
  <div id="cases-body"></div>
</div>
 
<div id="tab-stats" class="screen">
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">총 시도</div></div>
    <div class="stat-card"><div class="stat-num" id="s-correct">0</div><div class="stat-label">정답</div></div>
    <div class="stat-card"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">정확도</div></div>
  </div>
  <div class="card">
    <div class="label">폭력 위험요인 — KOPS 기반</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#E24B4A"></div>뇌경색·섬망·치매 등 기질성 정신장애</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#E24B4A"></div>알코올·약물 사용 (외출 후 음주 복귀 포함)</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#D85A30"></div>조현병·충동조절장애·인격장애</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#D85A30"></div>과거 폭력 행동 이력</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#F0A500"></div>반복적 불만 표현·공격적 언행 (전조 신호)</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#F0A500"></div>다인실 장기 입원 (생활환경 갈등 가능)</div>
  </div>
  <div class="card">
    <div class="label">학습 현황</div>
    <div id="stats-msg" style="font-size:13px;color:#888;line-height:1.6">아직 시뮬레이션을 진행하지 않았습니다.</div>
  </div>
</div>
 
<script>
const SCENARIOS = [
  {
    risk:{ color:'#F0A500', label:'🟡 긴장 증가', factor:'위험요인: 다인실 생활갈등 · 수면장애' },
    context:'새벽 2시, 6인실. 옆 침상 환자가 TV를 크게 틀어 수면 장애가 있는 환자 A가 흥분해 항의하고 있습니다.',
    speech:'"리모컨 제멋대로 쓰고 소리는 왜 저렇게 크게 틀어요! 잠을 어떻게 자요!"',
    choices:[
      {text:'A. 환자 A를 복도로 잠깐 안내해 감정을 충분히 듣고, 병실 이동 가능성을 검토한다.', type:'correct'},
      {text:'B. "두 분 다 조용히 하세요. 여기 병원이에요."', type:'wrong'},
      {text:'C. "TV 소리 줄여달라고 말씀드릴게요."라고만 하고 넘어간다.', type:'neutral'},
    ],
    feedbacks:[
      {title:'✓ 분리 + 공감 — 최선', text:'항의하는 환자를 별도 공간으로 이동해 감정을 먼저 들어주는 것이 핵심입니다. 사소한 생활 갈등이 폭행치사로 이어진 실제 사례가 있습니다.', cls:'good'},
      {title:'❌ 동시 제지 — 역효과', text:'양쪽 모두 무시당한다고 느껴 감정이 더 격해집니다. 폭력 전조 신호를 놓치게 됩니다.', cls:'bad'},
      {title:'△ 임시방편', text:'소리만 줄이는 것은 표면적 해결입니다. 감정 갈등은 남아 재발 가능성이 높습니다.', cls:'neutral'},
    ]
  },
  {
    risk:{ color:'#E24B4A', label:'🔴 폭력 가능성 높음', factor:'위험요인: 알코올 · 외출 후 음주 복귀' },
    context:'저녁 9시, 입원 환자가 무단 외출 후 음주 상태로 복귀해 같은 병실 환자와 몸싸움이 발생했습니다. 간호사가 말려 일단 정리됐습니다.',
    speech:'"저 사람이 먼저 건드렸잖아요! 왜 나한테만 뭐라 해요!"',
    choices:[
      {text:'A. "일단 진정하세요."라고 말하고 자리를 피한다.', type:'wrong'},
      {text:'B. "오늘은 그냥 주무세요."라고 달래고 상황을 지켜본다.', type:'wrong'},
      {text:'C. 두 환자를 즉시 분리하고 담당의·보호자에게 즉시 보고하며 병실 이동을 준비한다.', type:'correct'},
    ],
    feedbacks:[
      {title:'❌ 1차 폭행 후 방치 — 가장 위험', text:'자리를 피하면 2차 폭행이 발생합니다. 병원의 법적 보호 의무 위반으로 책임이 생깁니다.', cls:'bad'},
      {title:'❌ 달래기만으론 부족', text:'음주 상태 환자는 이성적 판단이 어렵습니다. 30분~1시간 후 재발 위험이 매우 높습니다.', cls:'bad'},
      {title:'✓ 즉각 분리 + 보고 — 표준 프로토콜', text:'1차 폭행 후 반드시 즉각 분리 → 담당의 보고 → 보호자 연락 → 병실 이동 순으로 조치해야 합니다.', cls:'good'},
    ]
  },
  {
    risk:{ color:'#E24B4A', label:'🔴 폭력 가능성 높음', factor:'위험요인: 섬망 · 기질성 정신장애' },
    context:'야간, 복부수술 후 2일차 75세 남성 환자가 섬망 증상으로 "집에 가야 한다"며 소리치고 옆 환자를 밀치려 합니다.',
    speech:'"나 집에 가야 돼! 이거 놔! 저 사람이 내 자리 뺏었잖아!"',
    choices:[
      {text:'A. 조명을 밝히고, 낮고 차분한 목소리로 "여기 있어요, 옆에 있을게요."를 반복하며 동료를 즉시 호출한다.', type:'correct'},
      {text:'B. 큰 소리로 "환자분! 여기 병원이에요! 누워 계세요!"라고 제지한다.', type:'wrong'},
      {text:'C. 즉시 억제대를 적용해 침대에 고정한다.', type:'wrong'},
    ],
    feedbacks:[
      {title:'✓ 섬망 표준 대응', text:'조명을 밝혀 현실 지남력을 높이고, 낮은 목소리로 반복 안심시키는 것이 핵심입니다. 혼자 대응하지 말고 2인 대응 체계를 갖추세요.', cls:'good'},
      {title:'❌ 고성·명령 — 역효과', text:'섬망 환자에게 큰 소리와 명령형 언어는 공포심을 자극해 공격성을 급격히 높입니다.', cls:'bad'},
      {title:'❌ 억제대 무단 적용 불가', text:'억제대는 반드시 의사 처방이 있어야 하며 최후 수단으로만 사용합니다. 무단 적용 시 법적·윤리적 문제가 발생합니다.', cls:'bad'},
    ]
  },
  {
    risk:{ color:'#D85A30', label:'🟠 공격 위험', factor:'위험요인: 보호자 분노 · 정보 부족' },
    context:'수술 후 합병증이 발생한 환자의 보호자가 의료진 과실을 주장하며 주먹을 쥐고 스테이션으로 다가오고 있습니다.',
    speech:'"당신들 때문에 우리 가족이 이렇게 된 거잖아요! 책임져요!"',
    choices:[
      {text:'A. "저는 모르는 일이에요. 담당 의사 선생님께 말씀하세요."', type:'wrong'},
      {text:'B. 즉시 자리를 피하고 아무 말도 하지 않는다.', type:'wrong'},
      {text:'C. "얼마나 힘드실지 압니다. 조용한 곳에서 이야기 나눠봐요."라며 안전거리를 유지하고 동료에게 신호를 보낸다.', type:'correct'},
    ],
    feedbacks:[
      {title:'❌ 책임 회피 — 불신 심화', text:'즉각적인 변명이나 책임 회피는 보호자의 분노를 더 키웁니다.', cls:'bad'},
      {title:'❌ 무대응 — 위험 방치', text:'아무 말 없이 자리를 피하면 보호자의 분노가 폭발할 수 있습니다.', cls:'bad'},
      {title:'✓ 공감 + 분리 + 동료 지원', text:'감정을 먼저 인정하고 안전한 공간으로 안내하는 것이 핵심입니다. 동료에게 신호를 보내 2인 대응 체계를 갖추세요.', cls:'good'},
    ]
  },
  {
    risk:{ color:'#F0A500', label:'🟡 긴장 증가', factor:'위험요인: 치매 · 기질성 정신장애' },
    context:'낮 시간, 치매 진단을 받은 고령 환자가 옆 침상 환자의 물건을 자신의 것이라고 주장하며 가져가려 하고 있습니다. 옆 환자가 강하게 항의하며 목소리가 커지고 있습니다.',
    speech:'"이거 내 거야! 내 거라고! 왜 남의 거 건드려요!"',
    choices:[
      {text:'A. "환자분, 그거 다른 분 물건이에요!"라고 큰 소리로 제지한다.', type:'wrong'},
      {text:'B. 치매 환자에게 조용히 다가가 다른 것에 관심을 돌리며 자연스럽게 물건을 제자리에 놓고, 두 환자를 분리한다.', type:'correct'},
      {text:'C. 항의하는 환자 편을 들어 치매 환자에게 잘못을 지적한다.', type:'wrong'},
    ],
    feedbacks:[
      {title:'❌ 직접 제지 — 공격성 증가', text:'치매 환자에게 직접적 제지는 혼란과 공격성을 높입니다. 인지 능력이 저하된 환자에게 논리적 설득은 효과가 없습니다.', cls:'bad'},
      {title:'✓ 주의 전환 + 분리', text:'치매 환자에게는 직접 대립하지 않고 관심을 다른 곳으로 자연스럽게 유도하는 것이 가장 효과적입니다. 두 환자를 조용히 분리하세요.', cls:'good'},
      {title:'❌ 편들기 — 갈등 심화', text:'치매 환자의 잘못을 직접 지적하면 수치심과 혼란으로 더 공격적인 행동을 유발할 수 있습니다.', cls:'bad'},
    ]
  },
  {

function showTab(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='cases') renderCases();
  if(name==='stats') renderStats();
}
 
function renderSim(){
  const s=SCENARIOS[cur];
  document.getElementById('prog').style.width=((cur+1)/SCENARIOS.length*100)+'%';
  document.getElementById('prog-text').textContent=(cur+1)+' / '+SCENARIOS.length;
  document.getElementById('risk-dot').style.background=s.risk.color;
  document.getElementById('risk-label').textContent=s.risk.label;
  document.getElementById('risk-label').style.color=s.risk.color;
  document.getElementById('risk-factor').textContent=s.risk.factor;
  document.getElementById('sim-body').innerHTML=`
    <div class="card"><div class="label">상황</div><div style="font-size:14px;line-height:1.6">${s.context}</div></div>
    <div class="bubble"><div class="bubble-label">환자 / 보호자</div>${s.speech}</div>
    ${s.choices.map((c,i)=>`<button class="choice" onclick="pick(${i})">${c.text}</button>`).join('')}
    <div id="feedback-area"></div><div id="next-area"></div>`;
  answered=false;
}
 
function pick(idx){
  if(answered) return;
  answered=true;
  const s=SCENARIOS[cur];
  document.querySelectorAll('.choice').forEach((b,i)=>b.classList.add(s.choices[i].type));
  const fb=s.feedbacks[idx];
  document.getElementById('feedback-area').innerHTML=`
    <div class="feedback ${fb.cls}"><div class="feedback-title">${fb.title}</div>${fb.text}</div>`;
  stats.total++;
  if(s.choices[idx].type==='correct') stats.correct++;
  const isLast=cur>=SCENARIOS.length-1;
  document.getElementById('next-area').innerHTML=
    `<button class="next-btn" onclick="${isLast?'resetSim()':'nextSim()'}">${isLast?'처음으로 돌아가기 ↺':'다음 시나리오 →'}</button>`;
}
function nextSim(){cur++;renderSim();}
function resetSim(){cur=0;renderSim();}
 
function renderCases(){
  const el=document.getElementById('cases-body');
  if(el.innerHTML) return;
  CASES.forEach((c,i)=>{
    const mapsLines=c.maps.split('\n').map(l=>`
      <div class="maps-stage">
        <div class="maps-dot" style="background:${l.includes('①')?'#F0A500':l.includes('②')?'#D85A30':'#E24B4A'}"></div>
        <div class="maps-stage-text">${l}</div>
      </div>`).join('');
    el.innerHTML+=`
      <div class="case-card">
        <div class="case-body">
          <span class="case-tag ${c.tag}">${c.tagText}</span>
          <div class="case-title">${c.title}</div>
          <div class="case-summary">${c.summary}</div>
          <div class="case-cause">${c.cause}</div>
          <button class="expand-btn" id="exp-${i}" onclick="toggleCase(${i})">자세히 보기 ↓</button>
          <div class="case-detail" id="case-${i}">
            <div class="detail-section">
              <div class="detail-label">잘못된 대응</div>
              <div class="step-row"><div class="step-icon step-bad">✗</div><div style="font-size:13px;line-height:1.5">${c.bad}</div></div>
            </div>
            <div class="detail-section">
              <div class="detail-label">올바른 대응</div>
              <div class="step-row"><div class="step-icon step-good">✓</div><div style="font-size:13px;line-height:1.5">${c.good}</div></div>
            </div>
            <div class="detail-section">
              <div class="solution-wrap">
                <div class="solution-header">해결 방안 — KOPS + MAPS 기반</div>
                <div class="solution-block">
                  <div class="solution-block-title"><div class="solution-block-num">1</div>폭력 예방 및 대응 규정 마련</div>
                  <div class="solution-items"><div class="solution-item">${c.kops_1}</div></div>
                </div>
                <div class="solution-block">
                  <div class="solution-block-title"><div class="solution-block-num">2</div>물리적·행정적 환경 개선</div>
                  <div class="solution-items"><div class="solution-item">${c.kops_2}</div></div>
                </div>
                <div class="solution-block">
                  <div class="solution-block-title"><div class="solution-block-num">3</div>지속적인 교육</div>
                  <div class="solution-items"><div class="solution-item">${c.kops_3}</div></div>
                </div>
                <div class="solution-block">
                  <div class="solution-block-title"><div class="solution-block-num">+</div>MAPS 갈등 3단계 대응</div>
                  <div class="solution-items">
                    <div class="maps-block">${mapsLines}</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="ref-box">${c.ref}</div>
          </div>
        </div>
      </div>`;
  });
}
 
function toggleCase(i){
  const el=document.getElementById('case-'+i);
  const btn=document.getElementById('exp-'+i);
  const open=el.style.display===''||el.style.display==='none';
  el.style.display=open?'block':'none';
  btn.textContent=open?'접기 ↑':'자세히 보기 ↓';
}
 
function renderStats(){
  document.getElementById('s-total').textContent=stats.total;
  document.getElementById('s-correct').textContent=stats.correct;
  const pct=stats.total?Math.round(stats.correct/stats.total*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('stats-msg').textContent=
    stats.total===0?'아직 시뮬레이션을 진행하지 않았습니다.':
    pct>=80?`정확도 ${pct}% — 훌륭합니다! 실전 병동 대응 능력이 높습니다.`:
    pct>=50?`정확도 ${pct}% — 양호합니다. 사례 탭으로 복습해보세요.`:
    `정확도 ${pct}% — 사례 탭을 먼저 학습한 후 다시 시도해보세요.`;
}
renderSim();
</script>
</body>
</html>
