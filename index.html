
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAFE TALK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
 
    .header { background: #534AB7; color: white; padding: 16px; text-align: center; }
    .header h1 { font-size: 20px; letter-spacing: 2px; }
    .header p  { font-size: 12px; opacity: .8; margin-top: 2px; }
 
    .nav { display: flex; background: white; border-bottom: 1px solid #eee; }
    .nav button { flex: 1; padding: 12px 4px; border: none; background: none; font-size: 12px; color: #888; cursor: pointer; }
    .nav button.active { color: #534AB7; border-bottom: 2px solid #534AB7; font-weight: 600; }
 
    .screen { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
    .screen.active { display: block; }
 
    .card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid #eee; }
    .label { font-size: 11px; color: #aaa; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
 
    .risk-bar { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; border-radius: 8px; background: white; border: 1px solid #eee; margin-bottom: 12px; }
    .risk-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .risk-info { flex: 1; }
    .risk-label { font-weight: 600; font-size: 13px; }
    .risk-factor { font-size: 11px; color: #888; margin-top: 2px; }
 
    .bubble { background: #f0f0f0; border-radius: 4px 12px 12px 12px; padding: 10px 12px; margin-bottom: 14px; font-size: 14px; line-height: 1.5; }
    .bubble-label { font-size: 11px; color: #aaa; font-weight: 600; margin-bottom: 2px; }
 
    .choice { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 13px; text-align: left; cursor: pointer; line-height: 1.5; transition: background .15s; }
    .choice:hover { background: #f8f8f8; }
    .choice.correct { background: #E1F5EE; border-color: #1D9E75; }
    .choice.wrong   { background: #FAECE7; border-color: #D85A30; }
    .choice.neutral { background: #FAEEDA; border-color: #BA7517; }
 
    .feedback { padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
    .feedback.good    { background: #E1F5EE; border-left: 3px solid #1D9E75; }
    .feedback.bad     { background: #FAECE7; border-left: 3px solid #D85A30; }
    .feedback.neutral { background: #FAEEDA; border-left: 3px solid #BA7517; }
    .feedback-title   { font-weight: 600; margin-bottom: 4px; }
    .protocol-box { background: #f0f4ff; border-radius: 6px; padding: 8px 10px; margin-top: 8px; font-size: 12px; color: #3C3489; line-height: 1.6; }
 
    .progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .progress-bar { flex: 1; height: 4px; background: #eee; border-radius: 2px; }
    .progress-fill { height: 100%; background: #534AB7; border-radius: 2px; transition: width .3s; }
 
    .next-btn { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; background: white; font-size: 14px; cursor: pointer; font-weight: 500; margin-top: 4px; }
    .next-btn:hover { background: #f5f5f5; }
 
    /* 사례 탭 */
    .case-card { background: white; border-radius: 12px; margin-bottom: 14px; border: 1px solid #eee; overflow: hidden; }
    .case-img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .case-img-placeholder { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .case-body { padding: 14px; }
    .case-tag { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
    .tag-alcohol  { background: #FAEEDA; color: #412402; }
    .tag-roommate { background: #E6F1FB; color: #0C447C; }
    .tag-delirium { background: #FAECE7; color: #4A1B0C; }
    .tag-guardian { background: #EAF3DE; color: #27500A; }
    .tag-mental   { background: #EEEDFE; color: #26215C; }
    .tag-noise    { background: #F1EFE8; color: #2C2C2A; }
 
    .case-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .case-summary { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 6px; }
    .case-cause { font-size: 12px; color: #D85A30; margin-bottom: 6px; }
    .expand-btn { font-size: 12px; color: #888; background: none; border: none; cursor: pointer; padding: 0; }
 
    .case-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
    .detail-section { margin-bottom: 10px; }
    .detail-label { font-size: 11px; font-weight: 600; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
    .step-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
    .step-icon { width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-bad  { background: #FAECE7; color: #993C1D; }
    .step-good { background: #E1F5EE; color: #0F6E56; }
    .solution-box { background: #f0f4ff; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #3C3489; line-height: 1.8; }
    .solution-box b { display: block; font-size: 13px; margin-bottom: 4px; color: #26215C; }
    .ref-box { font-size: 11px; color: #bbb; margin-top: 8px; line-height: 1.5; }
 
    /* 통계 탭 */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .stat-card { background: #f8f8f8; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-num   { font-size: 24px; font-weight: 600; color: #534AB7; }
    .stat-label { font-size: 11px; color: #aaa; margin-top: 2px; }
    .risk-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; color: #555; }
    .risk-dot-sm { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
 
<div class="header">
  <h1>SAFE TALK</h1>
  <p>AI 기반 병동 폭력 예방 교육 시스템</p>
</div>
 
<div class="nav">
  <button class="active" onclick="showTab('sim', this)">▶ 시뮬</button>
  <button onclick="showTab('cases', this)">📚 사례</button>
  <button onclick="showTab('stats', this)">📊 통계</button>
</div>
 
<!-- 시뮬레이션 -->
<div id="tab-sim" class="screen active">
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:20%"></div></div>
    <span id="prog-text" style="font-size:12px;color:#aaa">1 / 5</span>
  </div>
  <div class="risk-bar">
    <div class="risk-dot" id="risk-dot"></div>
    <div class="risk-info">
      <div class="risk-label" id="risk-label"></div>
      <div class="risk-factor" id="risk-factor"></div>
    </div>
  </div>
  <div id="sim-body"></div>
</div>
 
<!-- 사례 -->
<div id="tab-cases" class="screen">
  <div id="cases-body"></div>
</div>
 
<!-- 통계 -->
<div id="tab-stats" class="screen">
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">총 시도</div></div>
    <div class="stat-card"><div class="stat-num" id="s-correct">0</div><div class="stat-label">정답</div></div>
    <div class="stat-card"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">정확도</div></div>
  </div>
  <div class="card">
    <div class="label">폭력 위험요인 — KOPS 기반</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#E24B4A"></div>뇌경색·섬망·치매 등 기질성 정신장애</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#E24B4A"></div>알코올·약물 사용 (외출 후 음주 복귀 포함)</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#D85A30"></div>조현병·충동조절장애·인격장애</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#D85A30"></div>과거 폭력 행동 이력</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#F0A500"></div>반복적 불만 표현·공격적 언행 (전조 신호)</div>
    <div class="risk-item"><div class="risk-dot-sm" style="background:#F0A500"></div>다인실 장기 입원 (생활환경 갈등 가능)</div>
  </div>
  <div class="card">
    <div class="label">학습 현황</div>
    <div id="stats-msg" style="font-size:13px;color:#888;line-height:1.6">아직 시뮬레이션을 진행하지 않았습니다.</div>
  </div>
</div>
 
<script>
const SCENARIOS = [
  {
    risk: { color:'#F0A500', label:'🟡 긴장 증가', factor:'위험요인: 다인실 생활 갈등 · 수면 장애' },
    context: '새벽 2시, 6인실 내과 병동. 옆 침상 환자가 TV를 크게 틀어놓고 있습니다. 수면 장애가 있는 환자 A가 간호사에게 흥분하여 항의하고 있습니다.',
    speech: '"리모컨을 제멋대로 쓰고 TV 소리는 왜 저렇게 커요! 잠을 어떻게 자요!"',

      { text: 'A. "두 분 다 조용히 하세요. 여기 병원이에요."', type:'wrong' },
      { text: 'B. 환자 A를 복도로 잠깐 안내해 감정을 충분히 듣고, 병실로 돌아와 TV 볼륨 조절 및 병실 이동 가능성을 검토한다.', type:'correct' },
      { text: 'C. "제가 TV 소리 줄여달라고 말씀드릴게요."라고만 하고 넘어간다.', type:'neutral' },

    feedbacks: [

      { title:'✓ 분리 + 공감 — 최선', text:'항의하는 환자를 별도 공간으로 이동해 감정을 먼저 충분히 들어주는 것이 핵심입니다. 사소한 생활 갈등이 폭행치사로 이어진 실제 사례가 있습니다.', proto:'💡 필요 시 병실 이동, 담당의 보고까지 연결하세요.' },
      { title:'△ 임시방편', text:'소리만 줄이는 것은 표면적 해결입니다. 감정 갈등은 남아 재발 가능성이 높습니다.', proto:'' },
    ]
  },
  {
    risk: { color:'#D85A30', label:'🟠 공격 위험', factor:'위험요인: 알코올 · 외출 후 음주 복귀' },
    context: '저녁 9시, 신부전증 입원 환자가 무단 외출 후 음주 상태로 복귀했습니다. 같은 병실 환자와 말다툼이 시작되었고 5분 전 1차 몸싸움이 있었습니다. 간호사가 말려 일단 정리됐습니다.',

    choices: [
      { text: 'A. "일단 진정하세요."라고 말하고 자리를 피한다.', type:'wrong' },

      { text: 'C. "오늘은 그냥 주무세요."라고 달래고 상황을 지켜본다.', type:'neutral' },
    ],
    feedbacks: [
      { title:'❌ 1차 폭행 후 방치 — 가장 위험', text:'1차 폭행이 발생했다는 것은 갈등이 이미 신체적 수준으로 확대된 것입니다. 자리를 피하면 2차 폭행이 발생하고 병원의 법적 책임이 생깁니다.', proto:'⚠️ 실제 판례: 1차 폭행 후 분리 미흡으로 피해 환자 사망, 법원 병원 책임 인정 (MedicalTimes)' },
      { title:'✓ 즉각 분리 + 보고 — 표준 프로토콜', text:'1차 폭행 후 반드시 두 환자를 즉시 분리하고 담당의 보고 → 보호자 연락 → 병실 이동 순으로 조치해야 합니다.', proto:'💡 KOPS: 외출 후 복귀 환자의 음주·흥분 상태를 반드시 확인하세요.' },

    ]
  },
  {

    context: '야간 근무, 복부수술 후 2일차 75세 남성 환자가 섬망 증상을 보이며 침대에서 내려오려 합니다. "집에 가야 한다"며 소리치고 옆 환자를 밀치려 하고 있습니다.',

let cur = 0, answered = false, stats = { total:0, correct:0 };
 
function showTab(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'cases') renderCases();
  if (name === 'stats') renderStats();
}
 
function renderSim() {
  const s = SCENARIOS[cur];
  document.getElementById('prog').style.width = ((cur+1)/SCENARIOS.length*100) + '%';
  document.getElementById('prog-text').textContent = (cur+1) + ' / ' + SCENARIOS.length;
  document.getElementById('risk-dot').style.background = s.risk.color;
  document.getElementById('risk-label').textContent = s.risk.label;
  document.getElementById('risk-label').style.color = s.risk.color;
  document.getElementById('risk-factor').textContent = s.risk.factor;
  const body = document.getElementById('sim-body');
  body.innerHTML = `
    <div class="card"><div class="label">상황</div><div style="font-size:14px;line-height:1.6">${s.context}</div></div>
    <div class="bubble"><div class="bubble-label">환자 / 보호자</div>${s.speech}</div>
    ${s.choices.map((c,i) => `<button class="choice" onclick="pick(${i})">${c.text}</button>`).join('')}
    <div id="feedback-area"></div>
    <div id="next-area"></div>`;
  answered = false;
}
 
function pick(idx) {
  if (answered) return;
  answered = true;
  const s = SCENARIOS[cur];
  document.querySelectorAll('.choice').forEach((b,i) => b.classList.add(s.choices[i].type));
  const fb = s.feedbacks[idx];
  document.getElementById('feedback-area').innerHTML = `
    <div class="feedback ${fb.cls || (s.choices[idx].type==='correct'?'good':s.choices[idx].type==='wrong'?'bad':'neutral')}">
      <div class="feedback-title">${fb.title}</div>${fb.text}
      ${fb.proto ? `<div class="protocol-box">${fb.proto}</div>` : ''}
    </div>`;
  stats.total++;
  if (s.choices[idx].type === 'correct') stats.correct++;
  const isLast = cur >= SCENARIOS.length - 1;
  document.getElementById('next-area').innerHTML =
    `<button class="next-btn" onclick="${isLast ? 'resetSim()' : 'nextSim()'}">${isLast ? '처음으로 돌아가기 ↺' : '다음 시나리오 →'}</button>`;
}
 
function nextSim() { cur++; renderSim(); }
function resetSim() { cur = 0; renderSim(); }
 
function renderCases() {
  const el = document.getElementById('cases-body');
  if (el.innerHTML) return;
  CASES.forEach((c,i) => {
    const solutionLines = c.solution.split('\n').map(l => `<div style="padding:2px 0">${l}</div>`).join('');
    el.innerHTML += `
      <div class="case-card">
        <img class="case-img" src="${c.img}" alt="${c.alt}" onerror="this.style.display='none'">
        <div class="case-body">
          <span class="case-tag ${c.tag}">${c.tagText}</span>
          <div class="case-title">${c.title}</div>
          <div class="case-summary">${c.summary}</div>
          <div class="case-cause">${c.cause}</div>
          <button class="expand-btn" id="exp-${i}" onclick="toggleCase(${i})">자세히 보기 ↓</button>
          <div class="case-detail" id="case-${i}">
            <div class="detail-section">
              <div class="detail-label">잘못된 대응</div>
              <div class="step-row"><div class="step-icon step-bad">✗</div><div style="font-size:13px;line-height:1.5">${c.bad}</div></div>
            </div>
            <div class="detail-section">
              <div class="detail-label">올바른 대응</div>
              <div class="step-row"><div class="step-icon step-good">✓</div><div style="font-size:13px;line-height:1.5">${c.good}</div></div>
            </div>
            <div class="detail-section">
              <div class="detail-label">해결 방안 — 보고서 기반</div>
              <div class="solution-box"><b>시스템·교육 개선 방안</b>${solutionLines}</div>
            </div>
            <div class="ref-box">${c.ref}</div>
          </div>
        </div>
      </div>`;
  });
}
 
function toggleCase(i) {
  const el = document.getElementById('case-'+i);
  const btn = document.getElementById('exp-'+i);
  const open = el.style.display === 'none' || el.style.display === '';
  el.style.display = open ? 'block' : 'none';
  btn.textContent = open ? '접기 ↑' : '자세히 보기 ↓';
}
 
function renderStats() {
  document.getElementById('s-total').textContent = stats.total;
  document.getElementById('s-correct').textContent = stats.correct;
  const pct = stats.total ? Math.round(stats.correct/stats.total*100) : 0;
  document.getElementById('s-pct').textContent = pct + '%';
  const msg = stats.total === 0 ? '아직 시뮬레이션을 진행하지 않았습니다.'
    : pct >= 80 ? `정확도 ${pct}% — 훌륭합니다! 실전 병동 대응 능력이 높습니다.`
    : pct >= 50 ? `정확도 ${pct}% — 양호합니다. 사례 탭으로 복습해보세요.`
    : `정확도 ${pct}% — 사례 탭을 먼저 학습한 후 다시 시도해보세요.`;
  document.getElementById('stats-msg').textContent = msg;
}
 
renderSim();
